<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/app.js"></script>
</head>
<body onload="showDemoMessage('customer-login'); setDemoRole('customer')">
    <div class="navbar">
        <div class="container">
            <h1>Customer Portal</h1>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="./register.html">Register</a>
                <a href="./restaurants.html">Restaurants</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h2 class="page-title">Đăng nhập khách hàng</h2>
        <p class="page-desc">Đây là màn đăng nhập dành cho Customer.</p>

        <div class="card">
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="customer@example.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Nhập mật khẩu">
            </div>

            <button class="btn">Đăng nhập</button>
            <a class="btn btn-secondary" href="./register.html">Đi tới đăng ký</a>
        </div>
    </div>

    <div class="footer">Customer Login Page</div>
</body>
</html>
