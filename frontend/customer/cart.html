<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/app.js"></script>
    <script src="./js/customer-flow.js" defer></script>
</head>
<body data-page="customer-cart" onload="showDemoMessage('customer-cart')">

        <div class="container">
            <h1>Customer Portal</h1>
            <div class="nav-links">
                <a href="./restaurants.html">Restaurants</a>

                <a href="./checkout.html">Checkout</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h2 class="page-title">Giỏ hàng</h2>
        <p class="page-desc">

        <div id="cartInfo"></div>
