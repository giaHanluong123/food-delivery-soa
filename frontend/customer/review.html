<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/app.js"></script>
</head>
<body onload="showDemoMessage('customer-review')">
    <div class="navbar">
        <div class="container">
            <h1>Customer Portal</h1>
            <div class="nav-links">
                <a href="./tracking.html">Tracking</a>
                <a href="./restaurants.html">Restaurants</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h2 class="page-title">Đánh giá sau giao hàng</h2>
        <p class="page-desc">Màn này cho phép khách đánh giá nhà hàng và shipper.</p>

        <div class="card">
            <div class="form-group">
                <label>Đánh giá nhà hàng</label>
                <select>
                    <option>5 sao</option>
                    <option>4 sao</option>
                    <option>3 sao</option>
                    <option>2 sao</option>
                    <option>1 sao</option>
                </select>
            </div>

            <div class="form-group">
                <label>Đánh giá shipper</label>
                <select>
                    <option>5 sao</option>
                    <option>4 sao</option>
                    <option>3 sao</option>
                    <option>2 sao</option>
                    <option>1 sao</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nhận xét</label>
                <textarea placeholder="Món ngon, giao nhanh, shipper thân thiện..."></textarea>
            </div>

            <button class="btn">Gửi đánh giá</button>
        </div>
    </div>

    <div class="footer">Customer Review Page</div>
</body>
</html>
