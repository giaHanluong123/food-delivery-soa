<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Register</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/app.js"></script>
</head>
<body onload="showDemoMessage('customer-register')">
    <div class="navbar">
        <div class="container">
            <h1>Customer Portal</h1>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="./login.html">Login</a>
                <a href="./restaurants.html">Restaurants</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h2 class="page-title">Đăng ký tài khoản khách hàng</h2>
        <p class="page-desc">Tạo tài khoản để đặt món và theo dõi đơn hàng.</p>

        <div class="card">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" placeholder="Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="customer@example.com">
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" placeholder="0987654321">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" placeholder="Nhập mật khẩu">
            </div>
            <button class="btn">Đăng ký</button>
        </div>
    </div>

    <div class="footer">Customer Register Page</div>
</body>
</html>
