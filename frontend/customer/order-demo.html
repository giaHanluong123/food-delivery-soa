<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tạo đơn hàng demo - Customer</title>
  <link rel="stylesheet" href="./css/order-demo.css" />
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>Tạo đơn hàng demo</h1>
      <p>Tạo nhanh một đơn hàng để chuyển sang tracking realtime.</p>
    </header>

    <section class="card">
      <div class="grid">
        <div class="form-group">
          <label for="userId">User ID</label>
          <input id="userId" type="number" value="1" />
        </div>

        <div class="form-group">
          <label for="restaurantId">Restaurant ID</label>
          <input id="restaurantId" type="number" value="1" />
        </div>

        <div class="form-group">
          <label for="addressId">Address ID</label>
          <input id="addressId" type="number" value="1" />
        </div>

        <div class="form-group">
          <label for="paymentMethod">Phương thức thanh toán</label>
          <select id="paymentMethod">
            <option value="demo_gateway">demo_gateway</option>
            <option value="cash">cash</option>
          </select>
        </div>

        <div class="form-group">
          <label for="shippingFee">Phí ship</label>
          <input id="shippingFee" type="number" value="15000" />
        </div>

        <div class="form-group full-width">
          <label for="note">Ghi chú</label>
          <input id="note" type="text" value="Đơn hàng tạo từ frontend demo" />
        </div>

        <div class="form-group">
          <label for="menuItemId">Menu Item ID</label>
          <input id="menuItemId" type="number" value="1" />
        </div>

        <div class="form-group">
          <label for="quantity">Số lượng</label>
          <input id="quantity" type="number" value="2" />
        </div>
      </div>

      <div class="button-group">
        <button id="createOrderBtn">Tạo đơn hàng</button>
        <button id="goTrackingBtn" class="secondary">Mở tracking thủ công</button>
      </div>
    </section>

    <section class="card">
      <h2>Kết quả tạo đơn</h2>
      <div id="resultBox" class="result-box">Chưa có dữ liệu.</div>
    </section>
  </div>

  <script src="./js/order-demo.js"></script>
</body>
</html>
