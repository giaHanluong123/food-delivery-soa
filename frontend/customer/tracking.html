<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theo dõi đơn hàng - Customer</title>
  <link rel="stylesheet" href="./css/tracking.css" />
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>Theo dõi đơn hàng realtime</h1>
      <p>Customer có thể theo dõi trạng thái đơn hàng theo thời gian thực.</p>
    </header>

    <section class="card control-card">
      <div class="form-row">
        <label for="orderIdInput">Mã order_id</label>
        <input id="orderIdInput" type="number" placeholder="Ví dụ: 101" />
      </div>

      <div class="button-group">
        <button id="connectBtn">Kết nối realtime</button>
        <button id="disconnectBtn" class="secondary">Ngắt kết nối</button>
        <button id="clearLogBtn" class="secondary">Xóa log</button>
      </div>

      <div class="button-group">
        <button id="paymentPaidBtn">Thanh toán thành công</button>
        <button id="paymentFailedBtn" class="secondary">Thanh toán thất bại</button>
      </div>

      <div class="info-grid">
        <div class="info-box">
          <span class="label">Trạng thái kết nối</span>
          <span id="connectionStatus" class="badge neutral">Chưa kết nối</span>
        </div>

        <div class="info-box">
          <span class="label">Order hiện tại</span>
          <span id="currentOrderId">-</span>
        </div>

        <div class="info-box">
          <span class="label">Payment hiện tại</span>
          <span id="currentPaymentId">-</span>
        </div>

        <div class="info-box">
          <span class="label">User hiện tại</span>
          <span id="currentUserId">-</span>
        </div>

        <div class="info-box">
          <span class="label">Trạng thái đơn hiện tại</span>
          <span id="currentOrderStatus" class="status-text">-</span>
        </div>

        <div class="info-box">
          <span class="label">Sự kiện gần nhất</span>
          <span id="lastEventType">-</span>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Tiến trình đơn hàng</h2>
      <ul id="timelineList" class="timeline-list"></ul>
    </section>

    <section class="card">
      <h2>Log realtime</h2>
      <div id="eventLog" class="event-log"></div>
    </section>
  </div>

  <script src="./js/realtime-tracking.js"></script>
</body>
</html>
