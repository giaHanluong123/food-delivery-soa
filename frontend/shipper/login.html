<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipper Login</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/app.js"></script>
</head>
<body onload="showDemoMessage('shipper-login'); setDemoRole('shipper')">
    <div class="navbar">
        <div class="container">
            <h1>Shipper Portal</h1>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="./dashboard.html">Dashboard</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h2 class="page-title">Đăng nhập shipper</h2>
        <p class="page-desc">Màn đăng nhập dành cho người giao hàng.</p>

        <div class="card">
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="shipper@example.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Nhập mật khẩu">
            </div>

            <button class="btn">Đăng nhập</button>
        </div>
    </div>

    <div class="footer">Shipper Login Page</div>
</body>
</html>
